<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asistente Virtual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent:       #6366f1;
            --accent-glow:  #818cf8;
            --accent-dim:   #4338ca;
            --danger:       #ef4444;
            --bg:           #09090b;
            --surface:      #18181b;
            --border:       rgba(255,255,255,0.08);
            --text:         #f4f4f5;
            --text-muted:   #71717a;
            --radius:       16px;
            /* mic verde */
            --mic-green:    #22c55e;
            --mic-green-dim:#15803d;
            --mic-green-glow:rgba(34,197,94,0.55);
        }

        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* ── Fullscreen wrapper ──────────────────────────────── */
        #app {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* ── Avatar ocupa toda la pantalla ──────────────────── */
        #avatar-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--surface);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;   /* muestra el avatar completo sin recortar */
            object-position: center center;
            display: block;
            background: #000;
        }

        /* Gradient overlay at bottom (para legibilidad del mic) */
        #avatar-wrap::after {
            content: '';
            position: absolute;
            inset: auto 0 0 0;
            height: 30%;
            background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
            pointer-events: none;
        }

        /* Speaking indicator (ring sobre el borde de la pantalla) */
        #speaking-ring {
            position: absolute;
            inset: 0;
            border: 4px solid var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            box-shadow: inset 0 0 40px rgba(99,102,241,0.15);
        }
        .avatar-speaking #speaking-ring { opacity: 1; animation: ring-pulse 1.5s ease-in-out infinite; }

        @keyframes ring-pulse {
            0%, 100% { box-shadow: inset 0 0 40px rgba(99,102,241,0.15), 0 0 30px rgba(99,102,241,0.4); }
            50%       { box-shadow: inset 0 0 60px rgba(129,140,248,0.3), 0 0 50px rgba(129,140,248,0.7); }
        }

        /* ── Status badge ───────────────────────────────────── */
        #status-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(9,9,11,0.75);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.02em;
            white-space: nowrap;
            transition: opacity 0.3s;
        }

        #status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s;
            flex-shrink: 0;
        }

        /* Status variants */
        body.state-connecting  #status-dot { background: #f59e0b; animation: dot-blink 1s ease-in-out infinite; }
        body.state-ready       #status-dot { background: #22c55e; }
        body.state-listening   #status-dot { background: var(--accent-glow); animation: dot-blink 0.6s ease-in-out infinite; }
        body.state-processing  #status-dot { background: #f59e0b; animation: dot-blink 0.4s linear infinite; }
        body.state-speaking    #status-dot { background: #22c55e; animation: dot-blink 0.8s ease-in-out infinite; }

        @keyframes dot-blink {
            0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
        }

        /* ── Transcript overlay (sobre el video, arriba-izquierda) */
        #transcript-wrap {
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: min(500px, 88vw);
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }

        .transcript-line {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: fadein 0.3s ease;
        }

        @keyframes fadein { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

        .transcript-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 2px;
            flex-shrink: 0;
            width: 32px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .transcript-text {
            font-size: 13px;
            color: var(--text);
            line-height: 1.5;
            text-shadow: 0 1px 6px rgba(0,0,0,0.9);
        }
        .transcript-text.dim { color: var(--text-muted); }

        /* ── Botón MIC (sobre el avatar, abajo-centro) ──────── */
        #btn-mic {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;

            width: 88px; height: 88px;
            border-radius: 50%;
            border: none;
            cursor: pointer;

            /* VERDE */
            background: linear-gradient(135deg, var(--mic-green), var(--mic-green-dim));
            box-shadow: 0 4px 28px var(--mic-green-glow), 0 0 0 4px rgba(34,197,94,0.15);

            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, box-shadow 0.15s;
            outline: none;
        }

        #btn-mic:hover  {
            transform: translateX(-50%) scale(1.07);
            box-shadow: 0 6px 38px rgba(34,197,94,0.75), 0 0 0 6px rgba(34,197,94,0.2);
        }
        #btn-mic:active {
            transform: translateX(-50%) scale(0.95);
        }

        #btn-mic.listening {
            background: linear-gradient(135deg, var(--danger), #b91c1c);
            box-shadow: 0 4px 28px rgba(239,68,68,0.6), 0 0 0 4px rgba(239,68,68,0.15);
            animation: mic-pulse 1.2s ease-in-out infinite;
        }
        #btn-mic.listening:hover  {
            transform: translateX(-50%) scale(1.07);
        }
        #btn-mic.listening:active {
            transform: translateX(-50%) scale(0.95);
        }

        @keyframes mic-pulse {
            0%, 100% { box-shadow: 0 4px 28px rgba(239,68,68,0.6), 0 0 0 4px rgba(239,68,68,0.15); }
            50%       { box-shadow: 0 4px 46px rgba(239,68,68,0.95), 0 0 0 14px rgba(239,68,68,0.12); }
        }

        #btn-mic svg { width: 34px; height: 34px; fill: white; pointer-events: none; }

        #btn-mic.disabled-btn {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ── Botón conectar (bottom-left, discreto) ─────────── */
        #btn-connect {
            position: absolute;
            bottom: 52px;
            left: 24px;
            z-index: 30;

            height: 40px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(24,24,27,0.8);
            backdrop-filter: blur(10px);
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        #btn-connect:hover { background: rgba(39,39,42,0.9); border-color: rgba(255,255,255,0.15); }
        #btn-connect.connected { border-color: rgba(34,197,94,0.4); color: #86efac; }

        /* ── Botón PANTALLA COMPLETA (esquina sup-derecha, invisible) */
        #btn-fullscreen {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 50;
            width: 56px;
            height: 56px;
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0;  /* invisible */
            -webkit-tap-highlight-color: transparent;
        }
        /* Pequeño hover hint opcional — quítalo si prefieres que sea 100% invisible */
        /* #btn-fullscreen:hover { opacity: 0.15; background: white; border-radius: 0 0 0 8px; } */

        /* ── Tap overlay animation ───────────────────────────── */
        @keyframes tap-pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(99,102,241,0.5), 0 0 0 0 rgba(99,102,241,0.4); }
            50%       { box-shadow: 0 0 50px rgba(99,102,241,0.8), 0 0 0 18px rgba(99,102,241,0); }
        }

        /* ── Hidden audio / inputs ──────────────────────────── */
        audio { display: none; }
        input[type=hidden] { display: none; }
    </style>
</head>
<body class="state-connecting">

<!-- Elementos requeridos por client.js -->
<input type="hidden" id="sessionid" value="0">
<audio id="audio" autoplay></audio>
<input type="checkbox" id="use-stun" style="display:none">
<button id="start" style="display:none"></button>
<button id="stop"  style="display:none"></button>

<div id="app">

    <!-- Avatar fullscreen -->
    <div id="avatar-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div id="speaking-ring"></div>

        <!-- Status badge (arriba-centro) -->
        <div id="status-badge">
            <div id="status-dot"></div>
            <span id="status-text">Conectando…</span>
        </div>

        <!-- Transcript (sobre video, encima del mic) -->
        <div id="transcript-wrap">
            <div id="user-line" class="transcript-line" style="display:none">
                <span class="transcript-label">Tú</span>
                <span id="user-text" class="transcript-text dim"></span>
            </div>
        </div>

        <!-- Botón MIC (overlay, abajo-centro) -->
        <button id="btn-mic" class="disabled-btn" onclick="toggleMic()" title="Presiona para hablar">
            <!-- Mic icon -->
            <svg id="icon-mic" viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.364 9.364a1 1 0 0 1 1 1A7.364 7.364 0 0 1 13 18.92V21h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-2.08A7.364 7.364 0 0 1 4.636 11.364a1 1 0 0 1 2 0A5.364 5.364 0 0 0 12 16.727a5.364 5.364 0 0 0 5.364-5.363 1 1 0 0 1 1-1z"/></svg>
            <!-- Stop icon (hidden) -->
            <svg id="icon-stop" viewBox="0 0 24 24" style="display:none"><path d="M6 6h12v12H6z"/></svg>
        </button>

        <!-- Botón conectar (discreto, bottom-left) -->
        <button id="btn-connect" onclick="connectRTC()">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
                <path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 14.5A6.5 6.5 0 1110 3.5a6.5 6.5 0 010 13z"/>
                <path d="M10 6a1 1 0 011 1v3.586l2.707 2.707a1 1 0 01-1.414 1.414l-3-3A1 1 0 019 11V7a1 1 0 011-1z"/>
            </svg>
            Conectar
        </button>

        <!-- Botón invisible fullscreen (esquina sup-derecha) -->
        <button id="btn-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa" aria-label="Pantalla completa"></button>

        <!-- Overlay tap-to-start (Android / mobile autoplay fix) -->
        <div id="tap-overlay" onclick="handleTapToStart()" style="
            position:absolute; inset:0; z-index:100;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:16px;
            background:rgba(0,0,0,0.72); cursor:pointer;
        ">
            <div style="
                width:80px; height:80px; border-radius:50%;
                background:linear-gradient(135deg,#6366f1,#4338ca);
                display:flex; align-items:center; justify-content:center;
                box-shadow:0 0 40px rgba(99,102,241,0.6);
                animation: tap-pulse 2s ease-in-out infinite;
            ">
                <!-- Play icon -->
                <svg viewBox="0 0 24 24" fill="white" width="36" height="36"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <p style="color:#f4f4f5;font-size:15px;font-weight:500;margin:0;text-shadow:0 2px 8px rgba(0,0,0,0.8);">Toca para iniciar</p>
        </div>

    </div>
</div>

<!-- WebRTC client -->
<script src="client.js"></script>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// DEBUG LOGGER — visible en consola del navegador (F12 → Console)
// En Android: chrome://inspect en el PC para ver los logs del teléfono
// ══════════════════════════════════════════════════════════════════════════════
const LOG = (...args) => console.log('[Avatar]', ...args);
const WARN = (...args) => console.warn('[Avatar]', ...args);
const ERR = (...args) => console.error('[Avatar]', ...args);

// ─── Info de arranque ──────────────────────────────────────────────────────
LOG('=== INIT ===');
LOG('UA:', navigator.userAgent);
LOG('Secure context:', window.isSecureContext);
LOG('SpeechRecognition:', !!(window.SpeechRecognition || window.webkitSpeechRecognition));
LOG('getUserMedia:', !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
LOG('Protocol:', location.protocol, '| Host:', location.host);

// ─── Estado ────────────────────────────────────────────────────────────────
let isConnected        = false;
let isListening        = false;
let recognition        = null;
let isSpeaking         = false;
let speakCheckInterval = null;
let _audioUnlocked     = false;
let _micStream         = null;    // stream getUserMedia activo
let _mediaRecorder     = null;    // fallback MediaRecorder para POS/iMin
let _audioChunks       = [];      // chunks grabados
let _recTimerInterval  = null;    // timer de duración visible en UI
let _recSeconds        = 0;
// Si SpeechRecognition falla una vez, usamos MediaRecorder para siempre en este dispositivo
let _useFallbackASR    = !( window.SpeechRecognition || window.webkitSpeechRecognition );

LOG('Modo ASR inicial:', _useFallbackASR ? 'MediaRecorder (fallback)' : 'SpeechRecognition');

// ─── Estado UI ─────────────────────────────────────────────────────────────
function setState(state, text) {
    LOG(`setState → ${state}: "${text}"`);
    document.body.className = 'state-' + state;
    document.getElementById('status-text').textContent = text;
}

function setUserText(text, dim = false) {
    const line = document.getElementById('user-line');
    const span = document.getElementById('user-text');
    line.style.display = text ? 'flex' : 'none';
    span.textContent   = text;
    span.className     = 'transcript-text' + (dim ? ' dim' : '');
}

// ─── Pantalla completa ─────────────────────────────────────────────────────
function toggleFullscreen() {
    LOG('toggleFullscreen llamado');
    const el = document.documentElement;
    if (!document.fullscreenElement &&
        !document.webkitFullscreenElement &&
        !document.mozFullScreenElement) {
        const req = el.requestFullscreen
               || el.webkitRequestFullscreen
               || el.mozRequestFullScreen
               || el.msRequestFullscreen;
        if (req) req.call(el).catch(e => WARN('Fullscreen error:', e));
    } else {
        const exit = document.exitFullscreen
                  || document.webkitExitFullscreen
                  || document.mozCancelFullScreen
                  || document.msExitFullscreen;
        if (exit) exit.call(document);
    }
}

// ─── Tap-to-start (Android autoplay fix) ──────────────────────────────────
function handleTapToStart() {
    LOG('handleTapToStart — tap del usuario detectado');
    const overlay = document.getElementById('tap-overlay');
    if (overlay) overlay.style.display = 'none';

    const videoEl = document.getElementById('video');
    videoEl.muted = false;
    _audioUnlocked = true;
    LOG('Video desmutado dentro del gesto de usuario');

    if (videoEl.srcObject) {
        videoEl.play()
            .then(() => LOG('video.play() OK tras tap'))
            .catch(e => WARN('video.play() rechazado tras tap:', e.name, e.message));
    }

    connectRTC();
}

// ─── WebRTC ────────────────────────────────────────────────────────────────
function connectRTC() {
    if (isConnected) { LOG('connectRTC: ya conectado, ignorando'); return; }
    LOG('connectRTC: iniciando...');
    setState('connecting', 'Conectando…');
    start();   // client.js
    document.getElementById('btn-connect').textContent = '✓ Conectado';
    document.getElementById('btn-connect').classList.add('connected');
    isConnected = true;

    setTimeout(() => {
        document.getElementById('btn-mic').classList.remove('disabled-btn');
        setState('ready', 'Listo — presiona el micrófono');
        startSpeakingMonitor();
        LOG('Micrófono habilitado, monitor de speaking activo');
    }, 2500);
}

// ─── Monitor de "avatar hablando" ──────────────────────────────────────────
function startSpeakingMonitor() {
    LOG('startSpeakingMonitor iniciado');
    speakCheckInterval = setInterval(async () => {
        if (!isConnected || isListening) return;
        try {
            const sessionid = document.getElementById('sessionid').value;
            const res  = await fetch('/is_speaking', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionid })
            });
            const data = await res.json();
            const speaking = data.data;
            if (speaking !== isSpeaking) {
                isSpeaking = speaking;
                LOG('isSpeaking cambió →', speaking);
                const wrap = document.getElementById('avatar-wrap');
                if (speaking) {
                    wrap.classList.add('avatar-speaking');
                    setState('speaking', 'Hablando…');
                } else {
                    wrap.classList.remove('avatar-speaking');
                    setState('ready', 'Listo — presiona el micrófono');
                }
            }
        } catch (e) { /* silencio en prod */ }
    }, 800);
}

// ─── Listar dispositivos de audio ─────────────────────────────────────────
async function logAudioDevices() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
        WARN('enumerateDevices no disponible');
        return;
    }
    try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const audioInputs = devices.filter(d => d.kind === 'audioinput');
        LOG(`Dispositivos de entrada de audio encontrados: ${audioInputs.length}`);
        audioInputs.forEach((d, i) => {
            LOG(`  [${i}] deviceId="${d.deviceId}" label="${d.label || '(sin etiqueta — requiere permiso)'}"`);
        });
        if (audioInputs.length === 0) ERR('¡No hay dispositivos de audio de entrada!');
    } catch (e) {
        ERR('Error en enumerateDevices:', e);
    }
}

// ─── Pedir permiso de micrófono y fijar routing al dispositivo correcto ────
// ESTRATEGIA PARA MIC EXTERNO EN ANDROID:
// 1. getUserMedia abre el mic externo y MANTIENE el stream abierto.
// 2. Mientras el stream está activo, Android bloquea el routing en ese
//    dispositivo. SpeechRecognition (que corre en el mismo proceso Chrome)
//    hereda ese routing y usa el mismo hardware.
// 3. Al terminar (stopListening), cerramos el stream.
async function requestMicPermission() {
    LOG('requestMicPermission: solicitando getUserMedia...');
    try {
        // Liberar stream anterior si existe
        if (_micStream) {
            _micStream.getTracks().forEach(t => { t.stop(); LOG('Track previo detenido:', t.label); });
            _micStream = null;
        }

        // Pedir audio sin restricciones (que Android elija el default actual del SO)
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl:  true
            },
            video: false
        });

        _micStream = stream;
        const tracks = stream.getAudioTracks();
        LOG(`getUserMedia OK — tracks de audio: ${tracks.length}`);

        let activeMicLabel = '(desconocido)';
        tracks.forEach((t, i) => {
            const settings = t.getSettings();
            activeMicLabel = t.label || activeMicLabel;
            LOG(`  Track[${i}]: label="${t.label}" deviceId="${settings.deviceId || 'N/A'}" enabled=${t.enabled} readyState=${t.readyState}`);
        });

        // Mostrar en el status badge qué micrófono está activo
        const short = activeMicLabel.length > 28
            ? activeMicLabel.slice(0, 26) + '…'
            : activeMicLabel;
        setState('listening', `🎙 ${short}`);
        LOG('Mic activo:', activeMicLabel);

        // Listar todos los dispositivos (con labels visibles ahora que tenemos permiso)
        await logAudioDevices();

        // ⚠ NO cerramos el stream aquí.
        // El stream se mantiene abierto para que Android rutee SpeechRecognition
        // por el mismo dispositivo. Se cierra en stopListening().
        LOG('Stream getUserMedia ACTIVO — SpeechRecognition usará el mismo dispositivo');
        return true;
    } catch (e) {
        ERR('getUserMedia falló:', e.name, e.message);
        if (e.name === 'NotAllowedError') {
            setState('ready', '⚠ Permiso de micrófono denegado');
        } else if (e.name === 'NotFoundError') {
            setState('ready', '⚠ No se encontró micrófono');
        } else if (e.name === 'NotReadableError') {
            setState('ready', '⚠ Micrófono ocupado por otra app');
        } else {
            setState('ready', '⚠ Error de micrófono: ' + e.name);
        }
        return false;
    }
}

// ─── Speech Recognition ────────────────────────────────────────────────────
function setupRecognition() {
    LOG('setupRecognition: creando instancia...');
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) {
        ERR('SpeechRecognition NO disponible en este navegador');
        alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.');
        return null;
    }
    LOG('SpeechRecognition disponible:', SpeechRec.name || 'webkitSpeechRecognition');

    const rec = new SpeechRec();
    rec.lang              = 'es-CL';
    rec.interimResults    = true;
    rec.continuous        = false;
    rec.maxAlternatives   = 1;
    LOG('SpeechRecognition configurado: lang=es-CL, interimResults=true, continuous=false');

    rec.onstart = () => {
        LOG('SpeechRecognition.onstart — ESCUCHANDO');
        isListening = true;
        setState('listening', 'Escuchando…');
        const btn = document.getElementById('btn-mic');
        btn.classList.add('listening');
        document.getElementById('icon-mic').style.display  = 'none';
        document.getElementById('icon-stop').style.display = 'block';
        setUserText('…', true);
    };

    rec.onaudiostart = () => LOG('SpeechRecognition.onaudiostart — audio comenzó a capturarse');
    rec.onsoundstart = () => LOG('SpeechRecognition.onsoundstart — sonido detectado');
    rec.onspeechstart = () => LOG('SpeechRecognition.onspeechstart — habla detectada');
    rec.onspeechend = () => LOG('SpeechRecognition.onspeechend — habla terminó');
    rec.onsoundend = () => LOG('SpeechRecognition.onsoundend — sonido terminó');
    rec.onaudioend = () => LOG('SpeechRecognition.onaudioend — captura de audio terminó');

    rec.onresult = (event) => {
        let interim = '';
        let final   = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            const t = event.results[i][0].transcript;
            const conf = event.results[i][0].confidence;
            if (event.results[i].isFinal) {
                LOG(`Resultado FINAL: "${t}" (confidence=${conf.toFixed(2)})`);
                final += t;
            } else {
                interim += t;
            }
        }
        if (interim) LOG(`Resultado interim: "${interim}"`);
        setUserText(final || interim, !final);
        if (final) sendToLLM(final.trim());
    };

    rec.onerror = (e) => {
        ERR(`SpeechRecognition.onerror — error="${e.error}" message="${e.message || ''}"`);
        // Errores comunes en Android con mic externo:
        // "audio-capture" → el mic no pudo abrirse (otro proceso lo tiene, o dispositivo incorrecto)
        // "not-allowed"   → permiso denegado
        // "network"       → sin conexión para el STT en la nube
        // "no-speech"     → silencio timeout (normal, no es error real)
        if (e.error === 'audio-capture') {
            ERR('audio-capture: el mic externo puede estar siendo usado por otra app, o Android no lo redirigió correctamente');
            setState('ready', '⚠ Error captura de audio — intenta de nuevo');
        } else if (e.error === 'not-allowed') {
            ERR('not-allowed: permiso de micrófono denegado');
            setState('ready', '⚠ Permiso de micrófono denegado');
        } else if (e.error === 'network') {
            ERR('network: error de red con el STT — ¿hay conexión a internet?');
            setState('ready', '⚠ Error de red STT — verifica conexión');
        } else if (e.error !== 'no-speech') {
            setState('ready', `⚠ Error: ${e.error}`);
        } else {
            LOG('no-speech: sin voz detectada (timeout normal)');
        }
        stopListening();
    };

    rec.onend = () => {
        LOG('SpeechRecognition.onend — sesión terminada');
        stopListening();
    };

    return rec;
}

// ─── Forzar parada de recognition (con fallback abort) ────────────────────
// En Android con mic externo, recognition.stop() a veces no dispara onend
// y el botón queda bloqueado. Este wrapper espera 2.5 s y fuerza abort + UI reset.
let _stopTimeout = null;
function forceStopRecognition() {
    if (!recognition) { stopListening(); return; }
    LOG('forceStopRecognition: llamando stop()...');
    recognition.stop();

    // Timeout de seguridad: si onend no dispara en 2.5 s → abortar manualmente
    clearTimeout(_stopTimeout);
    _stopTimeout = setTimeout(() => {
        if (isListening) {
            WARN('forceStopRecognition: onend no disparó en 2.5s → abort() forzado');
            try { recognition.abort(); } catch(e) { LOG('abort() excepción (ignorada):', e.name); }
            stopListening();
        }
    }, 2500);
}

function stopListening() {
    LOG('stopListening');
    isListening = false;
    clearTimeout(_stopTimeout); // cancelar el abort de seguridad si onend llegó a tiempo

    // Cerrar el stream getUserMedia que mantenía el routing del mic externo
    if (_micStream) {
        _micStream.getTracks().forEach(t => { t.stop(); LOG('Track detenido:', t.label); });
        _micStream = null;
        LOG('Stream getUserMedia cerrado');
    }

    const btn = document.getElementById('btn-mic');
    btn.classList.remove('listening');
    document.getElementById('icon-mic').style.display  = 'block';
    document.getElementById('icon-stop').style.display = 'none';
    if (!isSpeaking) setState('ready', 'Listo — presiona el micrófono');
}

// ─── Toggle micrófono ──────────────────────────────────────────────────────
function toggleMic() {
    LOG('toggleMic — isConnected:', isConnected, '| isListening:', isListening, '| isSpeaking:', isSpeaking, '| fallback:', _useFallbackASR);

    // Desbloquear audio en primer uso del mic
    if (!_audioUnlocked) {
        const videoEl = document.getElementById('video');
        videoEl.muted = false;
        _audioUnlocked = true;
        if (videoEl.srcObject) videoEl.play().catch(e => WARN('play() fallback:', e.name));
    }

    if (!isConnected) {
        WARN('toggleMic: avatar no conectado');
        setState('connecting', 'Conecta el avatar primero');
        return;
    }
    if (isSpeaking) {
        LOG('toggleMic: avatar hablando → interrumpiendo');
        interruptAvatar();
        return;
    }
    if (isListening) {
        LOG('toggleMic: ya escuchando → deteniendo');
        if (_useFallbackASR) {
            stopMediaRecorderASR();
        } else {
            forceStopRecognition();
        }
        return;
    }

    setState('listening', 'Preparando micrófono…');
    requestMicPermission().then(ok => {
        if (!ok) { stopListening(); return; }

        if (_useFallbackASR) {
            // POS/iMin: usar MediaRecorder → /humanaudio
            LOG('Usando modo MediaRecorder (fallback ASR)');
            startMediaRecorderASR();
        } else {
            // Mobile/PC: usar SpeechRecognition
            LOG('Usando modo SpeechRecognition');
            recognition = setupRecognition();
            if (recognition) {
                // Auto-detección: si onaudiostart no dispara en 1.5s, el dispositivo
                // no puede capturar audio con SpeechRecognition → cambiar a MediaRecorder
                let _audioStarted = false;
                const _audioDetectTimer = setTimeout(() => {
                    if (!_audioStarted && isListening) {
                        WARN('⚠ SpeechRecognition: onaudiostart no disparó en 1.5s → POS detectado, cambiando a MediaRecorder');
                        _useFallbackASR = true;
                        try { recognition.abort(); } catch(e) {}
                        // Reiniciar con MediaRecorder
                        setTimeout(() => {
                            if (!isListening) startMediaRecorderASR();
                        }, 300);
                    }
                }, 1500);

                const _origAudioStart = recognition.onaudiostart;
                recognition.onaudiostart = () => {
                    _audioStarted = true;
                    clearTimeout(_audioDetectTimer);
                    if (_origAudioStart) _origAudioStart();
                    LOG('SpeechRecognition.onaudiostart — audio comenzó a capturarse');
                };

                try {
                    recognition.start();
                    LOG('recognition.start() llamado');
                } catch(e) {
                    ERR('recognition.start() excepción:', e.name, e.message);
                    clearTimeout(_audioDetectTimer);
                    _useFallbackASR = true;
                    stopListening();
                }
            }
        }
    });
}

// ─── WAV ASR via Web Audio API (fallback para POS/iMin) ──────────────────
// MediaRecorder produce WebM/Opus que soundfile NO puede leer.
// Web Audio API captura PCM crudo → lo codificamos como WAV (16-bit mono)
// → soundfile lo lee perfectamente.
// Esta es la misma técnica que usa la demo webrtc.github.io/samples.
let _audioCtx        = null;
let _audioSrc        = null;
let _scriptProc      = null;
let _pcmChunks       = [];   // Float32Array[]

function startMediaRecorderASR() {
    if (!_micStream) {
        ERR('startMediaRecorderASR: no hay stream de mic');
        stopListening();
        return;
    }

    try {
        // AudioContext — usamos sampleRate nativo del dispositivo.
        // El WAV llevará el sampleRate correcto en su cabecera.
        _audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
        _audioSrc   = _audioCtx.createMediaStreamSource(_micStream);
        _pcmChunks  = [];
        _recSeconds = 0;

        const bufSize   = 4096;
        _scriptProc = _audioCtx.createScriptProcessor(bufSize, 1, 1);
        _scriptProc.onaudioprocess = (ev) => {
            if (isListening) {
                // Copiar el buffer (el original se reutiliza)
                const data = ev.inputBuffer.getChannelData(0);
                _pcmChunks.push(new Float32Array(data));
            }
        };

        _audioSrc.connect(_scriptProc);
        _scriptProc.connect(_audioCtx.destination);

        LOG(`Web Audio API grabando — sampleRate=${_audioCtx.sampleRate} Hz`);

        // UI
        isListening = true;
        setState('listening', 'Escuchando… (0s)');
        const btn = document.getElementById('btn-mic');
        btn.classList.add('listening');
        document.getElementById('icon-mic').style.display  = 'none';
        document.getElementById('icon-stop').style.display = 'block';
        setUserText('🎙 Habla ahora…', true);

        clearInterval(_recTimerInterval);
        _recTimerInterval = setInterval(() => {
            _recSeconds++;
            setState('listening', `Escuchando… (${_recSeconds}s)`);
        }, 1000);

    } catch(e) {
        ERR('startMediaRecorderASR (Web Audio) error:', e.name, e.message);
        stopListening();
    }
}

async function stopMediaRecorderASR() {
    LOG('stopMediaRecorderASR (Web Audio)');
    clearInterval(_recTimerInterval);

    // Desconectar grafo de audio
    try { if (_scriptProc) { _scriptProc.disconnect(); _scriptProc = null; } } catch(_) {}
    try { if (_audioSrc)   { _audioSrc.disconnect();   _audioSrc   = null; } } catch(_) {}

    const chunks    = _pcmChunks;
    _pcmChunks      = [];
    const sampleRate = _audioCtx ? _audioCtx.sampleRate : 44100;

    try { if (_audioCtx) { await _audioCtx.close(); _audioCtx = null; } } catch(_) {}

    stopListening();

    if (chunks.length === 0) {
        WARN('Sin datos PCM grabados');
        return;
    }

    // Codificar PCM → WAV en el browser
    const wavBlob = encodePCMtoWAV(chunks, sampleRate);
    LOG(`WAV generado: ${wavBlob.size} bytes, sampleRate=${sampleRate}`);

    if (wavBlob.size < 2000) {
        WARN('Audio demasiado corto, ignorando');
        return;
    }

    setState('processing', 'Procesando audio…');
    setUserText('Procesando…', true);

    try {
        const sessionid = document.getElementById('sessionid').value;
        const form = new FormData();
        form.append('file', wavBlob, 'audio.wav');
        form.append('sessionid', String(sessionid));

        LOG(`Enviando WAV a /humanaudio (${wavBlob.size} bytes)…`);
        const res = await fetch('/humanaudio', { method: 'POST', body: form });
        LOG('humanaudio status:', res.status);

        if (!res.ok) {
            const txt = await res.text();
            ERR('humanaudio error:', res.status, txt);
            setState('ready', '⚠ Error STT — intenta de nuevo');
            return;
        }
        const data = await res.json();
        LOG('humanaudio OK:', JSON.stringify(data));
        setState('ready', 'Listo — presiona el micrófono');
        setUserText('', false);
    } catch(err) {
        ERR('Error enviando WAV:', err);
        setState('ready', '⚠ Error de red');
    }
}

// Codifica Float32Array[] → Blob WAV (16-bit mono, little-endian)
function encodePCMtoWAV(pcmChunks, sampleRate) {
    const numSamples = pcmChunks.reduce((s, c) => s + c.length, 0);
    const buf  = new ArrayBuffer(44 + numSamples * 2);
    const view = new DataView(buf);

    function str(offset, s) {
        for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i));
    }

    str(0, 'RIFF');
    view.setUint32(4,  36 + numSamples * 2, true); // tamaño total - 8
    str(8, 'WAVE');
    str(12, 'fmt ');
    view.setUint32(16, 16, true);          // subchunk size
    view.setUint16(20,  1, true);          // PCM = 1
    view.setUint16(22,  1, true);          // mono
    view.setUint32(24, sampleRate, true);  // sample rate
    view.setUint32(28, sampleRate * 2, true); // byte rate (16-bit mono)
    view.setUint16(32,  2, true);          // block align
    view.setUint16(34, 16, true);          // bits per sample
    str(36, 'data');
    view.setUint32(40, numSamples * 2, true);

    let offset = 44;
    for (const chunk of pcmChunks) {
        for (let i = 0; i < chunk.length; i++) {
            const s = Math.max(-1, Math.min(1, chunk[i]));
            view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            offset += 2;
        }
    }

    LOG(`encodePCMtoWAV: ${numSamples} samples → ${buf.byteLength} bytes`);
    return new Blob([buf], { type: 'audio/wav' });
}


// ─── Enviar al LLM / backend ───────────────────────────────────────────────
async function sendToLLM(text) {
    if (!text) return;
    LOG(`sendToLLM: "${text}"`);
    setState('processing', 'Procesando…');
    setUserText(text, false);

    const sessionid = document.getElementById('sessionid').value;
    try {
        const res = await fetch('/human', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text,
                type:      'chat',
                interrupt: true,
                sessionid: String(sessionid)
            })
        });
        LOG('sendToLLM: respuesta status', res.status);
    } catch (err) {
        ERR('sendToLLM: error de red:', err);
        setState('ready', 'Error de red — intenta de nuevo');
    }
}

// ─── Interrumpir avatar ────────────────────────────────────────────────────
async function interruptAvatar() {
    LOG('interruptAvatar');
    const sessionid = document.getElementById('sessionid').value;
    try {
        await fetch('/interrupt_talk', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionid: String(sessionid) })
        });
        LOG('interruptAvatar: solicitud enviada');
    } catch (e) { WARN('interruptAvatar: error de red', e); }

    setTimeout(() => {
        LOG('interruptAvatar: abriendo mic tras interrupción');
        recognition = setupRecognition();
        if (recognition) recognition.start();
    }, 300);
}

// ─── Auto-conectar al cargar ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    LOG('DOMContentLoaded — isMobile:', isMobile);
    LOG('Secure context:', window.isSecureContext, '| location.protocol:', location.protocol);

    if (!window.isSecureContext) {
        WARN('⚠ CONTEXTO NO SEGURO (HTTP). SpeechRecognition NO funcionará. Usar HTTPS.');
    }

    if (isMobile) {
        LOG('Mobile detectado → esperando tap del usuario (overlay visible)');
        // nada — el overlay espera el tap
    } else {
        LOG('Desktop detectado → auto-conectando');
        const overlay = document.getElementById('tap-overlay');
        if (overlay) overlay.style.display = 'none';
        document.getElementById('video').muted = false;
        _audioUnlocked = true;
        setTimeout(connectRTC, 800);
    }
});
</script>
